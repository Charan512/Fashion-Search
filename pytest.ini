[pytest]
testpaths =
    part_a_indexer/tests
    part_b_retriever/tests

addopts =
    -v
    --tb=short
    --strict-markers

markers =
    gpu: marks tests that require a CUDA GPU (deselect with -m "not gpu")
    slow: marks tests that take more than 30 seconds
    integration: marks tests requiring live Pinecone connection
